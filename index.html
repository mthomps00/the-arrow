<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arrow Game - Adjustable Scale Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            max-width: 650px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
            font-size: 28px;
        }
        .info-box {
            background: #eef6ff;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box p {
            margin: 5px 0;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 320px;
            margin-bottom: 25px;
        }
        canvas {
            cursor: crosshair;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        button:active:not(:disabled) {
            transform: scale(0.99);
        }
        #result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 The Arrow</h1>
    
    <div class="stats">
        <div>Round: <span id="current-round">1</span> / 3</div>
        <div>Total Score: <span id="total-score">0</span> pts</div>
    </div>

    <div class="info-box">
        <p><strong>Indicator:</strong> <span id="round-title">Loading...</span></p>
        <p><em>Task:</em> Hover over the chart to position the Arrow. <strong>Click once to lock in your guess</strong>, then submit.</p>
    </div>

    <div class="chart-container">
        <canvas id="gameChart"></canvas>
    </div>

    <button id="action-btn" onclick="handleAction()" disabled>Submit Guess</button>

    <div id="result-box"></div>
</div>

<script>
    const rounds = [
        {
            title: "City Homelessness Count",
            unit: "People",
            labels: ["2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023"],
            data: [1200, 1250, 1300, 1280, 1350, 1400, 1600, 1750, null],
            answer: 1900
        },
        {
            title: "Global Renewable Energy Capacity",
            unit: "GW",
            labels: ["2018", "2019", "2020", "2021", "2022", "2023"],
            data: [2350, 2580, 2800, 3150, 3400, null],
            answer: 3820
        },
        {
            title: "Smartphone Global Shipments",
            unit: "Millions",
            labels: ["2019", "2020", "2021", "2022", "2023", "2024"],
            data: [1370, 1290, 1350, 1200, 1170, null],
            answer: 1165
        }
    ];

    let roundIdx = 0;
    let score = 0;
    let gameChart = null;
    let userGuess = null;
    let submitted = false;
    let isLocked = false;

    const ctx = document.getElementById('gameChart').getContext('2d');

    function loadRound() {
        if (roundIdx >= rounds.length) {
            document.querySelector('.container').innerHTML = `
                <h1 style="text-align:center;">Game Completed! 🎉</h1>
                <p style="text-align:center; font-size: 18px;">Your final score is: <strong>${score}</strong> / 300 points.</p>
                <button onclick="location.reload()" style="width: 100%; margin-top:20px;">Play Again</button>
            `;
            return;
        }

        submitted = false;
        userGuess = null;
        isLocked = false;
        document.getElementById('action-btn').innerText = "Submit Guess";
        document.getElementById('action-btn').disabled = true;
        document.getElementById('result-box').style.display = 'none';
        
        const roundData = rounds[roundIdx];
        document.getElementById('current-round').innerText = roundIdx + 1;
        document.getElementById('round-title').innerText = roundData.title;

        // Automatically calculate Y-axis scaling boundaries that provide padding
        const allValues = [...roundData.data.filter(v => v !== null), roundData.answer];
        const minVal = Math.min(...allValues);
        const maxVal = Math.max(...allValues);
        const padding = (maxVal - minVal) * 0.3; // Adds 30% spacing at the top/bottom
        const yMin = Math.max(0, Math.floor(minVal - padding));
        const yMax = Math.ceil(maxVal + padding);

        if (gameChart) gameChart.destroy();

        gameChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: roundData.labels,
                datasets: [{
                    label: roundData.title,
                    data: [...roundData.data],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.2,
                    pointRadius: (ctx) => {
                        const index = ctx.dataIndex;
                        const dataArray = ctx.chart.data.datasets[0].data;
                        if (index === dataArray.length - 1) return 7;
                        if (index === dataArray.length - 2) return 5;
                        return 3;
                    },
                    pointBackgroundColor: (ctx) => {
                        const index = ctx.dataIndex;
                        const dataArray = ctx.chart.data.datasets[0].data;
                        if (index === dataArray.length - 1) {
                            return submitted ? '#2ecc71' : (isLocked ? '#27ae60' : '#e67e22');
                        }
                        if (index === dataArray.length - 2) return '#e74c3c';
                        return '#3498db';
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        min: yMin,
                        max: yMax
                    }
                }
            }
        });
    }

    // Track cursor for line and point movement
    ctx.canvas.addEventListener('mousemove', (e) => {
        if (submitted || isLocked) return;

        const chart = gameChart;
        const yAxis = chart.scales.y;
        const rect = ctx.canvas.getBoundingClientRect();
        const yPixel = e.clientY - rect.top;
        let val = yAxis.getValueForPixel(yPixel);

        // Clamp the value inside the dynamic min/max boundary limits
        if (val === undefined) return;
        val = Math.max(yAxis.min, Math.min(yAxis.max, val));

        userGuess = Math.round(val);
        const round = rounds[roundIdx];
        const updatedData = [...round.data];
        updatedData[updatedData.length - 1] = userGuess;

        chart.data.datasets[0].data = updatedData;
        chart.update('none');
    });

    // Toggle lock state on click
    ctx.canvas.addEventListener('click', (e) => {
        if (submitted) return;

        isLocked = !isLocked;

        const chart = gameChart;
        const yAxis = chart.scales.y;
        const rect = ctx.canvas.getBoundingClientRect();
        const yPixel = e.clientY - rect.top;
        let val = yAxis.getValueForPixel(yPixel);

        if (val !== undefined) {
            val = Math.max(yAxis.min, Math.min(yAxis.max, val));
            userGuess = Math.round(val);
            const round = rounds[roundIdx];
            const updatedData = [...round.data];
            updatedData[updatedData.length - 1] = userGuess;
            chart.data.datasets[0].data = updatedData;
            chart.update('none');
        }

        if (isLocked) {
            document.getElementById('action-btn').disabled = false;
            chart.data.datasets[0].pointBackgroundColor = (ctx) => {
                const index = ctx.dataIndex;
                const dataArray = ctx.chart.data.datasets[0].data;
                if (index === dataArray.length - 1) return '#27ae60';
                if (index === dataArray.length - 2) return '#e74c3c';
                return '#3498db';
            };
            chart.update('none');
        } else {
            document.getElementById('action-btn').disabled = true;
            chart.data.datasets[0].pointBackgroundColor = (ctx) => {
                const index = ctx.dataIndex;
                const dataArray = ctx.chart.data.datasets[0].data;
                if (index === dataArray.length - 1) return '#e67e22';
                if (index === dataArray.length - 2) return '#e74c3c';
                return '#3498db';
            };
            chart.update('none');
        }
    });

    function handleAction() {
        const round = rounds[roundIdx];

        if (submitted) {
            roundIdx++;
            loadRound();
        } else {
            if (userGuess === null) {
                alert("Please click the chart to set your guess first.");
                return;
            }

            submitted = true;
            document.getElementById('action-btn').innerText = "Next Round";

            const answer = round.answer;
            const difference = Math.abs(userGuess - answer);
            
            // Score proximity: Decays based on distance from target
            const roundScore = Math.max(0, Math.floor(100 - (difference / (answer * 0.5)) * 100));
            score += roundScore;

            document.getElementById('total-score').innerText = score;

            // Reveal true data point
            const updatedData = [...round.data];
            updatedData[updatedData.length - 1] = answer;
            gameChart.data.datasets[0].data = updatedData;
            
            // Set the final answer point to green
            gameChart.data.datasets[0].pointBackgroundColor = (ctx) => {
                const index = ctx.dataIndex;
                const dataArray = ctx.chart.data.datasets[0].data;
                if (index === dataArray.length - 1) return '#2ecc71';
                if (index === dataArray.length - 2) return '#e74c3c';
                return '#3498db';
            };
            gameChart.update();

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = 'success';
            resultBox.innerHTML = `
                Actual data was: <strong>${answer} ${round.unit}</strong><br>
                Your guess: <strong>${userGuess} ${round.unit}</strong> (Difference: ${difference.toFixed(1)})<br>
                Points Earned: <strong>${roundScore} pts</strong>
            `;
        }
    }

    // Initialize game
    loadRound();
</script>

</body>
</html>
