<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Arrow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #03060f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    #gameContainer { position: relative; }

    canvas {
      display: block;
      border-radius: 10px;
      box-shadow: 0 0 50px rgba(74, 158, 255, 0.35), 0 0 100px rgba(74, 158, 255, 0.15);
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(3, 6, 20, 0.82);
      color: #fff;
      border-radius: 10px;
      text-align: center;
      gap: 0;
    }

    .game-title {
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #4a9eff;
      text-shadow:
        0 0 20px rgba(74,158,255,0.9),
        0 0 50px rgba(74,158,255,0.5),
        0 0 90px rgba(74,158,255,0.25);
      margin-bottom: 10px;
      user-select: none;
    }

    .subtitle {
      font-size: 15px;
      color: #6a8daf;
      letter-spacing: 2px;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    .btn {
      padding: 13px 44px;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, #4a9eff 0%, #1a5fc8 100%);
      color: #fff;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 4px 24px rgba(74, 158, 255, 0.55);
    }
    .btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 32px rgba(74, 158, 255, 0.75);
    }
    .btn:active { transform: scale(0.98); }

    .controls-hint {
      margin-top: 22px;
      font-size: 13px;
      color: #3a5a7a;
      letter-spacing: 1px;
    }

    #gameOverTitle {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ff5e5e;
      text-shadow:
        0 0 20px rgba(255,94,94,0.9),
        0 0 50px rgba(255,94,94,0.4);
      margin-bottom: 20px;
      user-select: none;
    }

    .score-row {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .best-row {
      font-size: 15px;
      color: #6a8daf;
      margin-bottom: 34px;
      letter-spacing: 1px;
    }

    #gameOverScreen { display: none; }
  </style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <div class="game-title">The Arrow</div>
    <div class="subtitle">Guide the arrow through the void</div>
    <button class="btn" id="startBtn">&#9654;&nbsp; Play</button>
    <div class="controls-hint">Hold &uarr; / W to rise &nbsp;&bull;&nbsp; Hold &darr; / S to dive &nbsp;&bull;&nbsp; Tap to rise on mobile</div>
  </div>

  <!-- Game Over screen -->
  <div class="overlay" id="gameOverScreen">
    <div id="gameOverTitle">Game Over</div>
    <div class="score-row">Score &nbsp;<span id="finalScore" style="color:#4a9eff">0</span></div>
    <div class="best-row">Best &nbsp;<span id="bestScore">0</span></div>
    <button class="btn" id="restartBtn">&#8635;&nbsp; Try Again</button>
  </div>
</div>

<script>
/* =====================================================================
   THE ARROW  –  HTML5 Canvas Game
   ===================================================================== */

const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

// ── Canvas size ──────────────────────────────────────────────────────
const W = 820, H = 520;
canvas.width  = W;
canvas.height = H;

// ── DOM refs ─────────────────────────────────────────────────────────
const startScreen    = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl   = document.getElementById('finalScore');
const bestScoreEl    = document.getElementById('bestScore');

// ── Game-state ────────────────────────────────────────────────────────
let state = 'start';   // 'start' | 'playing' | 'dead'
let score     = 0;
let bestScore = 0;
try { bestScore = parseInt(localStorage.getItem('arrowBest') || '0', 10); } catch (e) { /* storage unavailable */ }
let frameCount = 0;
let speed  = 3.8;
const SPEED_MAX = 9;
const SPEED_INC_EVERY = 280; // frames

// ── Arrow physics ─────────────────────────────────────────────────────
const ARROW_X  = 130;
const GRAVITY  = 0.30;
const MAX_VY   = 7.5;
const UP_FORCE = 0.55;
const DN_FORCE = 0.45;
let arrowY = H / 2;
let arrowVY = 0;

// ── Obstacle config ───────────────────────────────────────────────────
const WALL_W   = 28;
const GAP_H    = 170;
const OBS_INT  = 155;   // frames between spawns

// ── Collections ───────────────────────────────────────────────────────
let obstacles       = [];
let gems            = [];
let trail           = [];
let collectFx       = [];
let deathParticles  = [];

// ── Background layers ─────────────────────────────────────────────────
let bgStars  = [];
let nebulae  = [];

// ── Input ─────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyS'].includes(e.code)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch: tap to boost up
canvas.addEventListener('touchstart', e => {
  if (state === 'playing') { arrowVY -= 4.5; e.preventDefault(); }
}, { passive: false });

// ═══════════════════════════════════════════════════════════════════════
// INIT HELPERS
// ═══════════════════════════════════════════════════════════════════════

function initBg() {
  bgStars = Array.from({ length: 160 }, () => ({
    x:     Math.random() * W,
    y:     Math.random() * H,
    r:     Math.random() * 1.4 + 0.4,
    spd:   Math.random() * 0.25 + 0.08,
    alpha: Math.random() * 0.65 + 0.25,
  }));

  nebulae = Array.from({ length: 4 }, () => ({
    x:    Math.random() * W,
    y:    Math.random() * H,
    rx:   Math.random() * 180 + 80,
    ry:   Math.random() * 80  + 40,
    hue:  Math.random() < 0.5 ? 210 : 270,
    alpha: Math.random() * 0.055 + 0.02,
    spd:  Math.random() * 0.15 + 0.05,
  }));
}

function resetGame() {
  arrowY    = H / 2;
  arrowVY   = 0;
  obstacles = [];
  gems      = [];
  trail     = [];
  collectFx = [];
  deathParticles = [];
  score      = 0;
  frameCount = 0;
  speed      = 3.8;
  initBg();
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW – BACKGROUND
// ═══════════════════════════════════════════════════════════════════════

function drawBg() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#020510');
  sky.addColorStop(0.5, '#07122a');
  sky.addColorStop(1,   '#050e22');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Nebulae
  for (const n of nebulae) {
    n.x -= n.spd;
    if (n.x + n.rx < 0) { n.x = W + n.rx; n.y = Math.random() * H; }
    ctx.save();
    ctx.globalAlpha = n.alpha;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.rx);
    g.addColorStop(0,   `hsla(${n.hue},90%,65%,1)`);
    g.addColorStop(1,   `hsla(${n.hue},90%,65%,0)`);
    ctx.fillStyle = g;
    ctx.scale(1, n.ry / n.rx);
    ctx.beginPath();
    ctx.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Stars
  for (const s of bgStars) {
    s.x -= s.spd;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,230,255,${s.alpha})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW – ARROW + TRAIL
// ═══════════════════════════════════════════════════════════════════════

function drawTrail() {
  const len = trail.length;
  for (let i = 0; i < len; i++) {
    const t = trail[i];
    const p = i / len;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3.5 * p, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74,158,255,${0.45 * p})`;
    ctx.fill();
  }
}

function drawArrow(x, y, vy) {
  const angle = Math.atan2(vy * 0.45, 12);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Outer glow
  ctx.shadowBlur  = 22;
  ctx.shadowColor = '#4a9eff';

  // Shaft
  ctx.fillStyle = '#d0e8ff';
  ctx.fillRect(-24, -2.5, 34, 5);

  // Arrowhead (dark layer)
  ctx.fillStyle = '#1a6acf';
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-7, -10);
  ctx.lineTo(-7,  10);
  ctx.closePath();
  ctx.fill();

  // Arrowhead (bright layer)
  ctx.fillStyle = '#4a9eff';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-7, -10);
  ctx.lineTo(2,   0);
  ctx.closePath();
  ctx.fill();

  // Highlight streak on head
  ctx.fillStyle = 'rgba(200,235,255,0.55)';
  ctx.beginPath();
  ctx.moveTo(9,  -1);
  ctx.lineTo(-3, -8);
  ctx.lineTo(-1,  0);
  ctx.closePath();
  ctx.fill();

  // Nock feathers – back
  ctx.shadowBlur = 0;
  ctx.fillStyle  = '#ff8040';
  ctx.beginPath();
  ctx.moveTo(-24,  0);
  ctx.lineTo(-35, -10);
  ctx.lineTo(-30,   0);
  ctx.lineTo(-35,  10);
  ctx.closePath();
  ctx.fill();

  // Nock feathers – front
  ctx.fillStyle = '#ffb060';
  ctx.beginPath();
  ctx.moveTo(-24,  0);
  ctx.lineTo(-35, -7);
  ctx.lineTo(-30,  0);
  ctx.lineTo(-35,  7);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW – OBSTACLES
// ═══════════════════════════════════════════════════════════════════════

function spawnObstacle() {
  const margin = 55;
  const gapY   = Math.random() * (H - GAP_H - margin * 2) + margin;
  obstacles.push({ x: W + WALL_W, gapY, passed: false });
}

function drawObstacles() {
  for (const obs of obstacles) {
    obs.x -= speed;

    drawWall(obs.x, 0,            WALL_W, obs.gapY,           true);
    drawWall(obs.x, obs.gapY + GAP_H, WALL_W, H - obs.gapY - GAP_H, false);

    if (!obs.passed && obs.x + WALL_W < ARROW_X) {
      obs.passed = true;
      score++;
    }
  }
  obstacles = obstacles.filter(o => o.x > -WALL_W - 20);
}

function drawWall(wx, wy, ww, wh, isTop) {
  if (wh <= 0) return;

  // Body gradient
  const g = ctx.createLinearGradient(wx, 0, wx + ww, 0);
  g.addColorStop(0,   '#122040');
  g.addColorStop(0.45,'#1e3a70');
  g.addColorStop(1,   '#122040');
  ctx.fillStyle = g;
  ctx.fillRect(wx, wy, ww, wh);

  // Border glow
  ctx.save();
  ctx.shadowBlur  = 10;
  ctx.shadowColor = '#3a7ac8';
  ctx.strokeStyle = '#2a5aa0';
  ctx.lineWidth   = 1.5;
  ctx.strokeRect(wx, wy, ww, wh);
  ctx.restore();

  // Cap + spikes
  const capH = 14;
  ctx.fillStyle = '#2a5aa0';

  if (isTop) {
    // cap at bottom of top wall
    ctx.fillRect(wx - 5, wy + wh - capH, ww + 10, capH);
    // spikes pointing downward
    ctx.fillStyle = '#3a6abf';
    for (let sx = wx - 3; sx < wx + ww + 3; sx += 9) {
      ctx.beginPath();
      ctx.moveTo(sx,     wy + wh - capH);
      ctx.lineTo(sx + 4.5, wy + wh);
      ctx.lineTo(sx + 9, wy + wh - capH);
      ctx.closePath();
      ctx.fill();
    }
  } else {
    // cap at top of bottom wall
    ctx.fillRect(wx - 5, wy, ww + 10, capH);
    // spikes pointing upward
    ctx.fillStyle = '#3a6abf';
    for (let sx = wx - 3; sx < wx + ww + 3; sx += 9) {
      ctx.beginPath();
      ctx.moveTo(sx,     wy + capH);
      ctx.lineTo(sx + 4.5, wy);
      ctx.lineTo(sx + 9, wy + capH);
      ctx.closePath();
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW – GEMS (collectibles)
// ═══════════════════════════════════════════════════════════════════════

function trySpawnGem() {
  if (obstacles.length < 1) return;
  if (Math.random() > 0.45) return;   // ~45% chance per obstacle
  const last = obstacles[obstacles.length - 1];
  const gemY = last.gapY + GAP_H / 2 + (Math.random() - 0.5) * 60;
  if (gemY < 30 || gemY > H - 30) return;
  gems.push({ x: W + 30, y: gemY, pulse: Math.random() * Math.PI * 2 });
}

function drawGems() {
  gems = gems.filter(g => g.x > -30);
  for (const gem of gems) {
    gem.x    -= speed;
    gem.pulse += 0.09;
    const sc = 1 + Math.sin(gem.pulse) * 0.18;

    ctx.save();
    ctx.translate(gem.x, gem.y);
    ctx.scale(sc, sc);

    ctx.shadowBlur  = 16;
    ctx.shadowColor = '#ffd700';
    ctx.fillStyle   = '#ffd700';
    drawStarShape(0, 0, 5, 11, 5);

    // Inner shine
    ctx.fillStyle = 'rgba(255,255,200,0.55)';
    drawStarShape(0, 0, 3, 6, 5);

    ctx.restore();

    // Collision
    const dx = gem.x - ARROW_X, dy = gem.y - arrowY;
    if (Math.hypot(dx, dy) < 20) {
      spawnCollectFx(gem.x, gem.y);
      score += 3;
      gem.x = -9999; // mark for removal
    }
  }
}

function drawStarShape(cx, cy, ri, ro, pts) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r     = i % 2 === 0 ? ro : ri;
    const angle = (i * Math.PI) / pts - Math.PI / 2;
    const px    = cx + r * Math.cos(angle);
    const py    = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

// ═══════════════════════════════════════════════════════════════════════
// PARTICLE EFFECTS
// ═══════════════════════════════════════════════════════════════════════

function spawnCollectFx(x, y) {
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    collectFx.push({ x, y, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5, life: 35, maxLife: 35 });
  }
}

function drawCollectFx() {
  collectFx = collectFx.filter(p => p.life > 0);
  for (const p of collectFx) {
    p.x += p.vx; p.y += p.vy; p.life--;
    const a = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * a, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,215,0,${a * 0.85})`;
    ctx.fill();
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 28; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 1;
    deathParticles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 55,
      maxLife: 55,
      r: Math.random() * 4 + 1,
      hue: Math.random() < 0.5 ? 210 : 30,
    });
  }
}

function drawDeathParticles() {
  deathParticles = deathParticles.filter(p => p.life > 0);
  for (const p of deathParticles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    const a = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},100%,65%,${a * 0.9})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════════════

function drawHUD() {
  // Score pill
  const label = String(score);
  const tw = ctx.measureText(label).width;
  const pw = Math.max(tw + 40, 80), ph = 38;
  const px = W / 2 - pw / 2, py = 14;

  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle   = '#000820';
  roundRect(px, py, pw, ph, 19);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#fff';
  ctx.font      = 'bold 22px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, W / 2, py + ph / 2);
  ctx.restore();

  // Speed indicator (subtle)
  const lvl = Math.floor((speed - 3.8) / 0.3) + 1;
  if (lvl > 1) {
    ctx.save();
    ctx.fillStyle   = 'rgba(74,158,255,0.55)';
    ctx.font        = '12px "Segoe UI", Arial, sans-serif';
    ctx.textAlign   = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(`LVL ${lvl}`, W - 14, 16);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════════════════════
// COLLISION DETECTION
// ═══════════════════════════════════════════════════════════════════════

function checkCollision() {
  if (arrowY < 6 || arrowY > H - 6) return true;

  // Arrow bounding box (rotated isn't critical – use slim capsule approx)
  const aLeft  = ARROW_X - 22;
  const aRight = ARROW_X + 12;
  const aTop   = arrowY - 5;
  const aBot   = arrowY + 5;

  for (const obs of obstacles) {
    const wLeft  = obs.x - 5;
    const wRight = obs.x + WALL_W + 5;

    if (aRight > wLeft && aLeft < wRight) {
      if (aTop < obs.gapY || aBot > obs.gapY + GAP_H) return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════════

function tick() {
  drawBg();

  if (state === 'playing') {
    frameCount++;

    // Increase speed
    if (frameCount % SPEED_INC_EVERY === 0) {
      speed = Math.min(speed + 0.32, SPEED_MAX);
    }

    // Controls
    if (keys['ArrowUp'] || keys['KeyW']) {
      arrowVY -= UP_FORCE;
    }
    if (keys['ArrowDown'] || keys['KeyS']) {
      arrowVY += DN_FORCE;
    }

    // Physics
    arrowVY = Math.max(-MAX_VY, Math.min(MAX_VY, arrowVY + GRAVITY));
    arrowY += arrowVY;

    // Spawn obstacles
    if (frameCount % OBS_INT === 0) {
      spawnObstacle();
      trySpawnGem();
    }

    // Update trail
    trail.push({ x: ARROW_X, y: arrowY });
    if (trail.length > 22) trail.shift();

    // Render
    drawTrail();
    drawObstacles();
    drawGems();
    drawCollectFx();
    drawArrow(ARROW_X, arrowY, arrowVY);
    drawHUD();

    // Collision
    if (checkCollision()) {
      spawnDeathParticles(ARROW_X, arrowY);
      state = 'dead';
      if (score > bestScore) {
        bestScore = score;
        try { localStorage.setItem('arrowBest', bestScore); } catch (e) { /* storage unavailable */ }
      }
      finalScoreEl.textContent = score;
      bestScoreEl.textContent  = bestScore;
      setTimeout(() => { gameOverScreen.style.display = 'flex'; }, 700);
    }
  }

  if (state === 'dead') {
    // Keep drawing background & particles after death
    drawObstacles();
    drawDeathParticles();
  }

  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════════════════
// BUTTON HANDLERS
// ═══════════════════════════════════════════════════════════════════════

document.getElementById('startBtn').addEventListener('click', () => {
  resetGame();
  state = 'playing';
  startScreen.style.display = 'none';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  resetGame();
  state = 'playing';
  gameOverScreen.style.display = 'none';
});

// ── Bootstrap ─────────────────────────────────────────────────────────
initBg();
bestScoreEl.textContent = bestScore;
requestAnimationFrame(tick);
</script>
</body>
</html>
